# --- Tearing ---
windowrule {
  name = windowrule-38
  immediate = on
  match:title = .*\.exe
}

windowrule {
  name = windowrule-39
  immediate = on
  match:title = .*minecraft.*
}

windowrule {
  name = windowrule-40
  immediate = on
  match:class = ^(steam_app).*
}


# No shadow for tiled windows (matches windows that are not floating).
windowrule {
  name = windowrule-41
  no_shadow = on
  match:float = 0
}


# ######## Workspace rules ########
workspace = special:special, gapsout:30

# ######## Layer rules ########
layerrule {
  name = layerrule-1
  xray = 1
  match:namespace = .*
}

# layerrule = noanim, .*
layerrule {
  name = layerrule-2
  no_anim = on
  match:namespace = walker
}

layerrule {
  name = layerrule-3
  no_anim = on
  match:namespace = selection
}

layerrule {
  name = layerrule-4
  no_anim = on
  match:namespace = overview
}

layerrule {
  name = layerrule-5
  no_anim = on
  match:namespace = anyrun
}

layerrule {
  name = layerrule-6
  no_anim = on
  match:namespace = indicator.*
}

layerrule {
  name = layerrule-7
  no_anim = on
  match:namespace = osk
}

layerrule {
  name = layerrule-8
  no_anim = on
  match:namespace = hyprpicker
}


layerrule {
  name = layerrule-9
  no_anim = on
  match:namespace = noanim
}

layerrule {
  name = layerrule-10
  blur = on
  ignore_alpha = 0
  match:namespace = gtk-layer-shell
}

layerrule {
  name = layerrule-11
  blur = on
  ignore_alpha = 0.5
  match:namespace = launcher
}

layerrule {
  name = layerrule-12
  blur = on
  ignore_alpha = 0.69
  match:namespace = notifications
}

layerrule {
  name = layerrule-13
  blur = on
  match:namespace = logout_dialog # wlogout
}


# Launchers need to be FAST
layerrule {
  name = layerrule-14
  no_anim = on
  match:namespace = gtk4-layer-shell
}


#notfication center swaync
layerrule {
  name = layerrule-15
  blur = on
  animation = slide right
  ignore_alpha = 0
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-16
  ignore_alpha = 0
  match:namespace = swaync-notification-window
}


