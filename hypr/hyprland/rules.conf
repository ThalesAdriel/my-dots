# ######## Window rules ########

# Uncomment to apply global transparency to all windows:
#windowrulev2 = opacity 0.89 override 0.89 override, class:.*

# Disable blur for xwayland context menus
windowrule {
  name = windowrule-1
  no_blur = on
  match:class = ^()$a
  match:title = ^()$
}

# windowrulev2 = noblur, xwayland:1

# Floating
windowrule {
  name = windowrule-2
  float = on
  match:class = ^(blueberry\.py)$
}

windowrule {
  name = windowrule-3
  float = on
  match:class = ^(guifetch)$   # FlafyDev/guifetch
}

windowrule {
  name = windowrule-4
  float = on
  size = (monitor_w*0.45)
  center = on
  match:class = ^(pavucontrol)$
}

windowrule {
  name = windowrule-5
  float = on
  size = (monitor_w*0.45) 
  center = on
  match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
  name = windowrule-6
  float = on
  size = (monitor_w*0.45)
  center = on
  match:class = ^(nm-connection-editor)$
}

windowrule {
  name = windowrule-7
  float = on
  match:class = .*plasmawindowed.*
}

windowrule {
  name = windowrule-8
  float = on
  match:class = kcm_.*
}

windowrule {
  name = windowrule-9
  float = on
  match:class = .*bluedevilwizard
}

windowrule {
  name = windowrule-10
  float = on
  match:title = .*Welcome
}

windowrule {
  name = windowrule-11
  float = on
  match:title = ^(Network Manager)$
}

windowrule {
  name = windowrule-12
  float = on
  size = 
  match:title = ^(overskride)$
}

windowrule {
  name = windowrule-13
  float = on
  size = 
  match:title = ^(Waypaper)$
}

windowrule {
  name = windowrule-14
  float = on
  match:class = org.freedesktop.impl.portal.desktop.kde
}

windowrule {
  name = windowrule-15
  float = on
  size = (monitor_w*0.45)
  match:class = ^(Zotero)$
}

windowrule {
  name = windowrule-16
  float = on
  center = on
  match:class = ^(com.heroicgameslauncher.hgl)$
}

windowrule {
  name = windowrule-17
  float = on
  center = on
  match:class = ^(com.github.unrud.VideoDownloader)$
}


windowrule {
  name = windowrule-18
  float = on
  match:class = (clipse) # ensure you have a floating window class set if you want this behavior
}

windowrule {
  name = windowrule-19
  size = 622 652
  match:class = (clipse) # set the size of the window
}


windowrule {
  name = windowrule-20
  float = on
  match:class = ^(adobe premiere pro.exe)$
}


# Move
# kde-material-you-colors spawns a window when changing dark/light theme. This is to make sure it doesn't interfere at all.
windowrule {
  name = windowrule-21
  float = on
  no_initial_focus = on
  move = (999999) (999999)
  match:class = ^(plasma-changeicons)$
}

# stupid dolphin copy
windowrule {
  name = windowrule-22
  move = (40) (80)
  match:title = ^(Copying — Dolphin)$
}


# Tiling
windowrule {
  name = windowrule-23
  tile = on
  match:class = ^dev\.warp\.Warp$
}


# Picture-in-Picture
windowrule {
  name = windowrule-24
  float = on
  keep_aspect_ratio = on
  move = ((monitor_w*0.73)) ((monitor_h*0.72))
  size = (monitor_w*0.25)
  pin = on
  match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
}


windowrule {
  name = windowrule-25
  float = on
  center = on
  size = (monitor_w*0.7)
  match:class = ^(xdg-desktop-portal-gtk)$
}


windowrule {
  name = windowrule-26
  float = on
  match:class = ^(steam)$
  match:title = negative:^(Steam)$
}

#windowrule = center, class:^(steam)$, title:negative:^(Steam)$
windowrule {
  name = windowrule-27
  center = on
  size = (monitor_w*0.7)
  float = on
  match:title = ^(Open File)(.*)$
}

windowrule {
  name = windowrule-28
